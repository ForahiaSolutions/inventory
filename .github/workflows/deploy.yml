name: Verified Production Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, mysql, bcmath

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install PHP Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Install JS Dependencies
      run: npm install --legacy-peer-deps

    - name: Run Build
      run: npm run build
      env:
        VITE_PUSHER_APP_KEY: ${{ secrets.PUSHER_APP_KEY }}
        VITE_PUSHER_APP_CLUSTER: ${{ secrets.PUSHER_APP_CLUSTER }}
        VITE_APP_NAME: "Elevate Interiors"

    - name: Copy Build Assets via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.PORT }}
        debug: true
        source: "public/build/*"
        target: "/home/u157985566/domains/forahia.com/public_html/inventory/public/build/"
        strip_components: 2

    - name: Run Sync and Post-Deployment Tasks
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.PORT }}
        debug: true
        timeout: 60s
        command_timeout: 30m
        script: |
          set -e
          cd /home/u157985566/domains/forahia.com/public_html/inventory || mkdir -p /home/u157985566/domains/forahia.com/public_html/inventory && cd /home/u157985566/domains/forahia.com/public_html/inventory
          
          echo "📥 Syncing code..."
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://${{ secrets.GITHUB_API_TOKEN }}@github.com/Chi-G/inventory.git
          fi
          git fetch origin main
          git reset --hard origin/main
          
          echo "🚀 Running post-deployment script..."
          bash deploy.sh
